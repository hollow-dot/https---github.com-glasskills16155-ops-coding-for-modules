<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
         body {
            font-family: Georgia, Helvetica, sans-serif;
        }   
        /* Style for the box */
        .border-box {
            border: 10px solid  rgb(39,83,23); /* thickness, style, color */
            height: 100vh;   /* full screen height */
            width: 99%;    /* full screen width */
            background-color: #FDFFF5; /* optional background */
        }
    </style>
</head>
<style>
     h1{
        position: absolute;
            left:2%;
            top: 1%;
     }
</style>
<style>
    .delete-post{position: absolute;
              left: 5%;
              top: 15%;
              border: 10px solid  rgb(39,83,23); /* thickness, style, color */
            height: 80vh;   /* full screen height */
            width: 90%;    /* full screen width */
            background-color: #F3F1E6; /* optional background */
    }
</style>
<style>
    h2{position: absolute;
       left: 33%;
        top: 1%;
        font-size: 190%;
    }
</style>
<style>
    .box-yes{position: absolute;
              left: 25%;
              top: 39%;
              border-radius: 15px;
              border: 10px solid  rgb(0,0,0);
              background-color: rgb(0,0,0);
              height: 15vh;   /* full screen height */
              width: 16%; 
    }
</style>
<style>
    .box-no{position: absolute;
              left: 65%;
              top: 39%;
              border-radius: 15px;
              border: 10px solid  rgb(0,0,0);
              background-color: rgb(0,0,0);
              height: 15vh;   /* full screen height */
              width: 16%; 
    }
</style>
<style>
    #yes-button{position: absolute;
            top: -30%;
            left: 30%;
            font-size: 320%;
            
    }
</style>
<style>
    #no-button{position: absolute;
            top: -30%;
            left: 35%;
            font-size: 320%;
    }           
</style>
<style>
    a{
        color:  #F3F1E6;
    }
</style>
<body>
     <div class="border-box">
      <h1><a href="edit_and_delete_post.html">back</a></h1>
      <div class="delete-post">
           <h2> Would you like to delete your post ?</h2>
        <div class="box-yes">
            <p id="yes-button"><a href="post_page.html">yes</a></p>
        </div>
        <div class="box-no">
             <p id="no-button"><a href="post_page.html">no</a></p>
        </div>  
      </div>
     </div>
</body>
</html>
