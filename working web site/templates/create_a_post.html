<body>
    <div class="border-box"> 
        <h1><a href="post_page.html">back</a></h1> 
        <h3> Please fill all non-optional fields </h3> 
        <div class="post-create">
        <P class="input-header" id="date-seeing">Date of observation </P>
        <input type="date"placeholder="date" 
            class="input-box" 
            id="date"
            required 
            min="2000-01-01" 
            max="2026-04-25">
        <P class="input-header" id="time-of">Time of observation</P>

        <input type="time"placeholder="Time" class="input-box" id="Time-of-observation">
        <P class="input-header" id="type-bird">Type of bird</P>
        <form>
         <label for="type-bird"></label>
         <select id="Type-of-bird" name="bird" class="input-box">
            <option value="wood Pigeon">Wood Pigeon</option>
            <option value="house Sparrow">House Sparrow</option>
            <option value="starling">Starling</option>
            <option value="blue Tit">Blue Tit</option>
            <option value="blackbird">Blackbird</option>
            <option value="robin">Robin</option>
            <option value="goldfinch">Goldfinch</option>
            <option value="magpie">Magpie</option>
            <option value="other">other</option>
         </select>
        </form>
        <P class="input-header" id="doing">What activity were they doing ?</P>
        <form>
         <label for="activaty"></label>
         <select id="activity" name="doing" class="input-box">
            <option value="visit">visit</option>
            <option value="feeding">feeding</option>
            <option value="nesting">nesting</option>
            <option value="Other">Other </option>
         </select>
        </form>
        <P class="input-header" id="Duration">Duration of observation (in minutes) </P>

        <input type="number"placeholder="observation" class="input-box" id="observation"
         required 
            min="1" 
            max="60">

        <P class="input-header" id="area">Location</P>
        <form>
        <label for="#Location"></label>
            <select id="Location" name="location" class="input-box">
                <option value="erean">Erean</option>
                <option value="brunad">Brunad</option>
                <option value=" bylyn ">Bylyn</option>
                <option value="docia">Docia</option>
                <option value="zord">Zord</option>
        <option value="yaean ">Yaean </option>
        <option value="frestin">Frestin</option>
        <option value="stonyam">Stonyam</option>
        <option value="marend">Marend</option>
        <option value="ryall">Ryall</option>
        <option value="pryn">Pryn</option>
        <option value="keivia">Keivia</option>
        <option value="ruril">Ruril</option>
        <option value="tallan ">Tallan</option>
        <option value="aohad">Adohad</option>
        <option value="obelyn">Obelyn</option>
        <option value="holmer">Holmer</option>
        <option value="vertwall">Vertwall</option>
        </select>
        </form>
        
        <P class="input-header" id="image-guide">Image Optional must be max 1.2 
            <br>Megabytes in size; png or jpg only 
        </P> 
        <form action="/post" method="POST" enctype="multipart/form-data">
        <input type="file" id="image_for_post" name="image">
        <button type="submit">create post</button>
        </form>
        <P class="input-header" id="messege">comment</P> 
        <input type="text" id="comments">
        </div>
    </div>
</body>
</html>
